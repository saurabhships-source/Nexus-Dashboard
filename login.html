<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - Nexus Project Management</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css" />
  <link rel="stylesheet" href="style.css">
</head>
<body class="auth-body">
  <div class="auth-container">
    <div class="auth-card">
      <div class="auth-header">
        <div class="auth-logo">
          <i class="fas fa-rocket"></i>
        </div>
        <h1 class="auth-title">Welcome to Nexus</h1>
        <p class="auth-subtitle">Sign in to your account</p>
      </div>

      <form id="loginForm" class="auth-form">
        <div class="form-group">
          <label for="email" class="form-label">Email Address</label>
          <input type="email" id="email" name="email" class="form-input" required placeholder="Enter your email" />
        </div>

        <div class="form-group">
          <label for="password" class="form-label">Password</label>
          <div class="password-input-group">
            <input type="password" id="password" name="password" class="form-input" required placeholder="Enter your password" />
            <button type="button" class="password-toggle" id="togglePassword">
              <i class="fas fa-eye"></i>
            </button>
          </div>
        </div>

        <div class="form-group">
          <label for="role" class="form-label">Login as</label>
          <select id="role" name="role" class="form-select">
            <option value="admin">Super Admin</option>
            <option value="business">Business Owner</option>
            <option value="team">Team Member</option>
            <option value="client">Client</option>
          </select>
        </div>

        <button type="submit" class="auth-button">
          <span class="button-text">Sign In</span>
          <span class="button-loader hidden">
            <i class="fas fa-spinner fa-spin"></i>
          </span>
        </button>
      </form>

      <div class="auth-footer">
        <p>Forgot your password? <a href="#" class="auth-link">Reset Password</a></p>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
